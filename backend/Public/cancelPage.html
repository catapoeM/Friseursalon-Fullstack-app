<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Buchung stornieren</title>

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f5f5f5;
    }
    h1 {
      color: #333;

    button {
      background-color: #ff4d4f;
      color: white;

    }

      margin-top: 20px;
      font-size: 16px;
      color: green;
    }
    .error {
      color: red;
    }
